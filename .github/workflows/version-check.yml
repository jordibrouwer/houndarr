name: Version Check

# Validate VERSION ↔ CHANGELOG.md consistency on PRs that touch
# release-related files.  Catches mismatches before merge so the
# tag-time gate in release.yml is a safety net, not the first line
# of defence.

on:
  pull_request:
    paths:
      - "VERSION"
      - "CHANGELOG.md"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  version-check:
    name: Version consistency
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate VERSION and CHANGELOG.md
        run: |
          set -euo pipefail
          errors=0

          # --- VERSION file format ---
          if [ ! -f VERSION ]; then
            echo "::error::VERSION file not found"
            exit 1
          fi

          FILE_VERSION=$(tr -d '[:space:]' < VERSION)
          if ! echo "$FILE_VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::VERSION must be exactly X.Y.Z (got '${FILE_VERSION}')"
            errors=$((errors + 1))
          fi

          # --- CHANGELOG heading must match VERSION ---
          if ! grep -qE "^## \[${FILE_VERSION}\] - [0-9]{4}-[0-9]{2}-[0-9]{2}" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no '## [${FILE_VERSION}] - YYYY-MM-DD' entry"
            errors=$((errors + 1))
          fi

          # --- Matched block must contain at least one ### subsection ---
          BLOCK=$(awk "/^## \[${FILE_VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          if ! echo "$BLOCK" | grep -qE '^### (Added|Fixed|Changed|Removed)'; then
            echo "::error::CHANGELOG block for ${FILE_VERSION} has no valid ### subsection (Added/Fixed/Changed/Removed)"
            errors=$((errors + 1))
          fi

          # --- Block must end with --- separator ---
          if ! echo "$BLOCK" | grep -qE '^---$'; then
            echo "::error::CHANGELOG block for ${FILE_VERSION} is missing trailing '---' separator"
            errors=$((errors + 1))
          fi

          # --- ### headers must be from the allowed set ---
          BAD_HEADERS=$(echo "$BLOCK" | grep -E '^### ' | grep -vE '^### (Added|Fixed|Changed|Removed)$' || true)
          if [ -n "$BAD_HEADERS" ]; then
            echo "::error::CHANGELOG block for ${FILE_VERSION} contains disallowed ### headers:"
            echo "$BAD_HEADERS"
            errors=$((errors + 1))
          fi

          if [ "$errors" -gt 0 ]; then
            echo "::error::${errors} validation error(s) found"
            exit 1
          fi

          echo "Version check passed: VERSION=${FILE_VERSION}, CHANGELOG entry valid"
