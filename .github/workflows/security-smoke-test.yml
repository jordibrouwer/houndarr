name: Security Smoke Test

on:
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "website/**"
      - ".claude/**"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  smoke-test:
    name: Security smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: houndarr:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start container
        run: |
          mkdir -p /tmp/houndarr-smoke-data
          docker run -d \
            --name houndarr-smoke \
            -p 8877:8877 \
            -v /tmp/houndarr-smoke-data:/data \
            houndarr:smoke

      - name: Wait for health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8877/api/health | grep -q '"status":"ok"'; then
              echo "Houndarr is healthy (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: not ready yet, sleeping 2s..."
            sleep 2
          done
          echo "Houndarr did not become healthy within 60s"
          docker logs houndarr-smoke
          exit 1

      - name: Create test account
        run: |
          curl -sf -X POST http://localhost:8877/setup \
            -d 'username=admin&password=CITestPass1!&password_confirm=CITestPass1!' \
            -o /dev/null

      - name: Run security smoke test
        env:
          HOUNDARR_CONTAINER: houndarr-smoke
        run: bash scripts/security_smoke_test.sh http://localhost:8877 CITestPass1!

      - name: Dump container logs on failure
        if: failure()
        run: docker logs houndarr-smoke

      - name: Stop and remove container
        if: always()
        run: |
          docker stop houndarr-smoke || true
          docker rm houndarr-smoke || true
