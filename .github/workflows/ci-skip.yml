name: CI Skip (docs-only)

# Provide passing required-check statuses when a PR touches only
# documentation or agent-config files.  Every other workflow uses
# paths-ignore to skip these paths, so without this shim those required
# checks would never report and the PR would stay blocked by branch
# protection.

on:
  pull_request:
    paths:
      - "docs/**"
      - "**/*.md"
      - "website/**"
      - ".claude/**"
      - "scripts/marketing/**"

permissions:
  checks: write

concurrency:
  group: ci-skip-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  skip-checks:
    name: CI Skip (docs-only)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const checks = [
              'Lint (ruff)',
              'Format (ruff)',
              'Type check (mypy)',
              'Test (Python 3.12)',
              'Dependency audit (pip-audit)',
              'SAST (bandit)',
              'Trivy filesystem scan',
              'Dependency review',
              'Build (no push)',
              'Trivy image scan',
              'Security smoke test',
              'Version consistency',
            ];
            const sha = context.payload.pull_request.head.sha;
            const now = new Date().toISOString();
            for (const name of checks) {
              try {
                await github.rest.checks.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  head_sha: sha,
                  name,
                  status: 'completed',
                  conclusion: 'success',
                  completed_at: now,
                  output: {
                    title: 'Skipped (docs-only)',
                    summary: 'Docs-only change; CI check not required.',
                  },
                });
                core.info(`Created check run: ${name}`);
              } catch (error) {
                core.setFailed(
                  `Failed to create check run "${name}": ${error.message}`
                );
                throw error;
              }
            }
            core.info(`All ${checks.length} check runs created`);
