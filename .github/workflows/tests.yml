name: Tests

on:
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "website/**"
      - ".claude/**"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      # Run pytest under xdist with worker-per-CPU.  Each test gets its own
      # tmp_data_dir + per-call respx mocks, so worker isolation holds.
      # The browser e2e suite is excluded by `norecursedirs` in pyproject.toml.
      - name: Run tests
        run: python -m pytest -q --tb=short -n auto

      - name: Sanity checks
        run: |
          python -m compileall -q src/
          python -m houndarr --help > /dev/null
