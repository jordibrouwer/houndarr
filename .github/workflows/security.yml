name: Security

on:
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "website/**"
      - ".claude/**"
      - "scripts/marketing/**"
  schedule:
    # Every Monday at 09:00 UTC
    - cron: "0 9 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  dependency-audit:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Run dependency audit
        env:
          # Space-separated CVE IDs with no upstream fix available yet.
          # Remove entries as fix versions are released.
          # Leave blank when no ignores are needed.
          # CVE-2026-4539: pygments (transitive via pytest/rich), no fix version
          PIP_AUDIT_IGNORE: "CVE-2026-4539"
        shell: bash
        run: |
          args=(pip-audit -r requirements.txt -r requirements-dev.txt)
          for cve in $PIP_AUDIT_IGNORE; do
            args+=(--ignore-vuln "$cve")
          done
          "${args[@]}"

  sast:
    name: SAST (bandit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install bandit
        run: |
          python -m pip install --upgrade pip
          pip install bandit[toml]

      - name: Run bandit
        run: bandit -r src/ -c pyproject.toml

  trivy-fs:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Trivy filesystem scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: "true"
          exit-code: "1"

      # Upload SARIF to the GitHub Security tab for non-fork runs.
      # Fork PRs lack security-events: write so this step is skipped.
      - name: Run Trivy (SARIF for GitHub Security tab)
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: "true"
          exit-code: "0"

      - name: Upload Trivy SARIF to GitHub Security tab
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-filesystem
