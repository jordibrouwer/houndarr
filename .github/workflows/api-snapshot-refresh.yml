name: API Snapshot Refresh

on:
  schedule:
    - cron: "0 10 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  refresh:
    name: Refresh *arr OpenAPI snapshots
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Fetch latest upstream snapshots
        run: |
          mkdir -p docs/api
          curl --fail --silent --show-error --location \
            "https://raw.githubusercontent.com/Sonarr/Sonarr/develop/src/Sonarr.Api.V3/openapi.json" \
            --output docs/api/sonarr_openapi.json.new
          curl --fail --silent --show-error --location \
            "https://raw.githubusercontent.com/Radarr/Radarr/develop/src/Radarr.Api.V3/openapi.json" \
            --output docs/api/radarr_openapi.json.new
          curl --fail --silent --show-error --location \
            "https://raw.githubusercontent.com/Whisparr/Whisparr/develop/src/Whisparr.Api.V3/openapi.json" \
            --output docs/api/whisparr_openapi.json.new
          curl --fail --silent --show-error --location \
            "https://raw.githubusercontent.com/lidarr/Lidarr/develop/src/Lidarr.Api.V1/openapi.json" \
            --output docs/api/lidarr_openapi.json.new
          curl --fail --silent --show-error --location \
            "https://raw.githubusercontent.com/Readarr/Readarr/develop/src/Readarr.Api.V1/openapi.json" \
            --output docs/api/readarr_openapi.json.new

      - name: Apply updates and sync snapshot hashes
        id: sync
        run: |
          python - <<'PY'
          from __future__ import annotations

          import hashlib
          from pathlib import Path

          repo = Path.cwd()
          api_dir = repo / "docs" / "api"
          tests_file = repo / "tests" / "test_docs_api.py"

          SPECS = ["sonarr", "radarr", "whisparr", "lidarr", "readarr"]

          changed = False

          for name in SPECS:
              current = api_dir / f"{name}_openapi.json"
              fetched = api_dir / f"{name}_openapi.json.new"

              if not fetched.exists():
                  continue

              if not current.exists() or current.read_bytes() != fetched.read_bytes():
                  fetched.replace(current)
                  changed = True
              else:
                  fetched.unlink()

          text = tests_file.read_text(encoding="utf-8")
          new_text = text

          for name in SPECS:
              spec_path = api_dir / f"{name}_openapi.json"
              if not spec_path.exists():
                  continue
              spec_hash = hashlib.sha256(spec_path.read_bytes()).hexdigest()
              const_name = f"{name.upper()}_SNAPSHOT_SHA256"
              marker = f'{const_name} = "'
              if marker in new_text:
                  old_hash = new_text.split(marker)[1].split('"', 1)[0]
                  new_text = new_text.replace(
                      f'{const_name} = "{old_hash}"',
                      f'{const_name} = "{spec_hash}"',
                  )

          if new_text != text:
              tests_file.write_text(new_text, encoding="utf-8")
              changed = True

          out = repo / "_changed.txt"
          out.write_text("true" if changed else "false", encoding="utf-8")
          PY

          echo "changed=$(cat _changed.txt)" >> "$GITHUB_OUTPUT"

      - name: Remove temp marker
        run: rm -f _changed.txt

      - name: Create pull request
        if: steps.sync.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          branch: chore/api-snapshot-refresh
          delete-branch: true
          commit-message: "chore: refresh *arr api snapshots"
          title: "chore: refresh *arr api snapshots"
          body: |
            ## Summary
            - Refresh `docs/api/sonarr_openapi.json` from Sonarr upstream OpenAPI source.
            - Refresh `docs/api/radarr_openapi.json` from Radarr upstream OpenAPI source.
            - Refresh `docs/api/whisparr_openapi.json` from Whisparr upstream OpenAPI source.
            - Refresh `docs/api/lidarr_openapi.json` from Lidarr upstream OpenAPI source.
            - Refresh `docs/api/readarr_openapi.json` from Readarr upstream OpenAPI source.
            - Sync snapshot SHA constants in `tests/test_docs_api.py` so required CI checks run and snapshot integrity stays explicit.

            ## Notes
            - This PR is generated by the scheduled `API Snapshot Refresh` workflow.
            - No auto-merge is performed; review and merge when appropriate.
          labels: |
            docs
            chore
