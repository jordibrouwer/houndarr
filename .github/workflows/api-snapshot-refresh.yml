name: API Snapshot Refresh

on:
  schedule:
    - cron: "0 10 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  refresh:
    name: Refresh Sonarr/Radarr OpenAPI snapshots
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Fetch latest upstream snapshots
        run: |
          mkdir -p docs/api
          curl --fail --silent --show-error --location \
            "https://raw.githubusercontent.com/Sonarr/Sonarr/develop/src/Sonarr.Api.V3/openapi.json" \
            --output docs/api/sonarr_openapi.json.new
          curl --fail --silent --show-error --location \
            "https://raw.githubusercontent.com/Radarr/Radarr/develop/src/Radarr.Api.V3/openapi.json" \
            --output docs/api/radarr_openapi.json.new

      - name: Apply updates and sync snapshot hashes
        id: sync
        run: |
          python - <<'PY'
          from __future__ import annotations

          import hashlib
          from pathlib import Path

          repo = Path.cwd()
          sonarr = repo / "docs" / "api" / "sonarr_openapi.json"
          radarr = repo / "docs" / "api" / "radarr_openapi.json"
          sonarr_new = repo / "docs" / "api" / "sonarr_openapi.json.new"
          radarr_new = repo / "docs" / "api" / "radarr_openapi.json.new"
          tests_file = repo / "tests" / "test_docs_api.py"

          changed = False

          if not sonarr.exists() or sonarr.read_bytes() != sonarr_new.read_bytes():
              sonarr_new.replace(sonarr)
              changed = True
          else:
              sonarr_new.unlink()

          if not radarr.exists() or radarr.read_bytes() != radarr_new.read_bytes():
              radarr_new.replace(radarr)
              changed = True
          else:
              radarr_new.unlink()

          sonarr_hash = hashlib.sha256(sonarr.read_bytes()).hexdigest()
          radarr_hash = hashlib.sha256(radarr.read_bytes()).hexdigest()

          text = tests_file.read_text(encoding="utf-8")
          new_text = text
          new_text = new_text.replace(
              "SONARR_SNAPSHOT_SHA256 = \"" + text.split("SONARR_SNAPSHOT_SHA256 = \"")[1].split("\"", 1)[0] + "\"",
              f'SONARR_SNAPSHOT_SHA256 = "{sonarr_hash}"',
          )
          new_text = new_text.replace(
              "RADARR_SNAPSHOT_SHA256 = \"" + text.split("RADARR_SNAPSHOT_SHA256 = \"")[1].split("\"", 1)[0] + "\"",
              f'RADARR_SNAPSHOT_SHA256 = "{radarr_hash}"',
          )

          if new_text != text:
              tests_file.write_text(new_text, encoding="utf-8")
              changed = True

          out = repo / "_changed.txt"
          out.write_text("true" if changed else "false", encoding="utf-8")
          PY

          echo "changed=$(cat _changed.txt)" >> "$GITHUB_OUTPUT"

      - name: Remove temp marker
        run: rm -f _changed.txt

      - name: Create pull request
        if: steps.sync.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/api-snapshot-refresh
          delete-branch: true
          commit-message: "chore: refresh sonarr and radarr api snapshots"
          title: "chore: refresh sonarr and radarr api snapshots"
          body: |
            ## Summary
            - Refresh `docs/api/sonarr_openapi.json` from Sonarr upstream OpenAPI source.
            - Refresh `docs/api/radarr_openapi.json` from Radarr upstream OpenAPI source.
            - Sync snapshot SHA constants in `tests/test_docs_api.py` so required CI checks run and snapshot integrity stays explicit.

            ## Notes
            - This PR is generated by the scheduled `API Snapshot Refresh` workflow.
            - No auto-merge is performed; review and merge when appropriate.
          labels: |
            docs
            chore
