version: 2
updates:
  # Python dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      production-deps:
        patterns:
          - "fastapi"
          - "uvicorn"
          - "jinja2"
          - "aiosqlite"
          - "httpx"
          - "bcrypt"
          - "cryptography"
          - "itsdangerous"
          - "python-multipart"
          - "click"
      dev-deps:
        patterns:
          - "ruff"
          - "mypy"
          - "pytest*"
          - "anyio"

  # npm (Docusaurus docs site)
  - package-ecosystem: "npm"
    directory: "/website"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      production-deps:
        dependency-type: production
        update-types:
          - minor
          - patch
      dev-deps:
        dependency-type: development
        update-types:
          - minor
          - patch

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
