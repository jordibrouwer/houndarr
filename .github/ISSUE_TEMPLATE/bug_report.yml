name: Bug Report
description: Report a bug in Houndarr
title: "fix: "
labels: ["type: bug", "priority: medium"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to Settings
        2. Add a Sonarr instance
        3. Click "Test Connection"
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: houndarr-version
    attributes:
      label: Houndarr Version
      placeholder: "e.g., 1.0.0 (shown in the footer)"
    validations:
      required: true

  - type: input
    id: arr-version
    attributes:
      label: Radarr / Sonarr / Lidarr / Readarr / Whisparr Version
      placeholder: "e.g., Radarr 5.11.0, Sonarr 4.0.8"

  - type: input
    id: docker-version
    attributes:
      label: Docker Version
      placeholder: "e.g., 27.3.1"

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant log output from the Logs page or Docker logs.
      render: text
