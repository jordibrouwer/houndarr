{% extends "base.html" %}
{% set show_nav = false %}

{% block title %}Setup — Houndarr{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[calc(100vh-8rem)]">
  <div class="w-full max-w-md">
    <!-- Logo / Header -->
    <div class="text-center mb-8">
      <img
        src="/static/img/houndarr-logo-dark-ui.png"
        alt="Houndarr logo"
        class="mx-auto w-36 h-36 object-contain drop-shadow-[0_0_22px_rgba(34,211,238,0.22)]"
      />
      <h1 class="text-2xl font-bold text-white">Welcome to Houndarr</h1>
      <p class="mt-2 text-slate-400 text-sm">Create your admin username and password.</p>
    </div>

    <!-- Setup form -->
    <div class="bg-slate-900 border border-slate-800 rounded-xl p-6 shadow-xl">
      {% if error %}
      <div class="mb-4 bg-red-900/50 border border-red-700 text-red-200 rounded-lg px-4 py-3 text-sm" role="alert">
        {{ error }}
      </div>
      {% endif %}

      <form action="/setup" method="post" class="space-y-5">
        <div>
          <label for="username" class="block text-sm font-medium text-slate-300 mb-1.5">
            Username
          </label>
          <input
            id="username"
            name="username"
            type="text"
            autocomplete="username"
            required
            minlength="3"
            maxlength="32"
            pattern="[A-Za-z0-9_.-]+"
            class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2.5 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition-colors"
            placeholder="admin"
            autofocus
          />
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-slate-300 mb-1.5">
            Password
          </label>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="new-password"
            required
            minlength="8"
            class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2.5 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition-colors"
            placeholder="Minimum 8 characters"
          />
        </div>

        <div>
          <label for="password_confirm" class="block text-sm font-medium text-slate-300 mb-1.5">
            Confirm Password
          </label>
          <input
            id="password_confirm"
            name="password_confirm"
            type="password"
            autocomplete="new-password"
            required
            minlength="8"
            class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2.5 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition-colors"
            placeholder="Repeat your password"
          />
        </div>

        <button
          type="submit"
          class="w-full bg-brand-600 hover:bg-brand-500 text-white font-semibold py-2.5 rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-brand-500 focus:ring-offset-2 focus:ring-offset-slate-900">
          Create Account &amp; Get Started
        </button>
      </form>
    </div>

    <p class="mt-6 text-center text-xs text-slate-600">
      Keep your username and password secure.
    </p>
  </div>
</div>
{% endblock %}
