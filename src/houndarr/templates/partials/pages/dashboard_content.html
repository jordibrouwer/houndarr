<div class="sr-only" data-page-key="dashboard" data-page-title="Dashboard — Houndarr" aria-hidden="true"></div>

<style>
  .instance-card {
    opacity: 1;
    transform: none;
  }

  .instance-card.is-entering {
    opacity: 0;
    transform: translateY(8px);
    animation: instance-card-in 220ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  @keyframes instance-card-in {
    from {
      opacity: 0;
      transform: translateY(8px);
    }

    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .metric-changed {
    animation: metric-pulse 360ms ease-out;
  }

  @keyframes metric-pulse {
    0% {
      background-color: rgba(14, 165, 233, 0.24);
      box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.32) inset;
    }

    100% {
      background-color: rgba(30, 41, 59, 0.6);
      box-shadow: 0 0 0 0 rgba(56, 189, 248, 0);
    }
  }

  [data-run-now-btn="true"] {
    transition: background-color 180ms ease, color 180ms ease, box-shadow 180ms ease,
      transform 180ms ease;
  }

  [data-run-now-btn="true"].is-running {
    background-color: rgb(14 116 144);
    color: rgb(224 242 254);
    box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.38) inset;
  }

  [data-run-now-btn="true"].is-success {
    background-color: rgb(22 101 52);
    color: rgb(220 252 231);
    box-shadow: 0 0 0 1px rgba(74, 222, 128, 0.4) inset;
  }

  [data-run-now-btn="true"].is-error {
    background-color: rgb(153 27 27);
    color: rgb(254 226 226);
    box-shadow: 0 0 0 1px rgba(248, 113, 113, 0.45) inset;
    animation: run-now-shake 320ms ease;
  }

  @keyframes run-now-shake {
    0%,
    100% {
      transform: translateX(0);
    }

    20% {
      transform: translateX(-3px);
    }

    40% {
      transform: translateX(3px);
    }

    60% {
      transform: translateX(-2px);
    }

    80% {
      transform: translateX(2px);
    }
  }

  @media (prefers-reduced-motion: reduce) {
    .instance-card,
    .instance-card.is-entering,
    .metric-changed {
      transition: none;
      animation: none;
      opacity: 1;
      transform: none;
    }

    [data-run-now-btn="true"].is-error {
      animation: none;
    }
  }
</style>

<div class="flex items-center justify-between mb-6">
  <h1 class="text-2xl font-bold text-white">Dashboard</h1>
  <a
    href="/settings"
    hx-get="/settings"
    hx-target="#app-content"
    hx-swap="innerHTML"
    hx-push-url="true"
    class="text-sm text-brand-400 hover:text-brand-300 transition-colors"
  >+ Add Instance</a>
</div>

<!-- Instance cards - polled every 15 s via HTMX -->
<div
  id="instance-grid"
  data-hydrated="false"
  hx-get="/api/status"
  hx-trigger="load, every 15s"
  hx-swap="innerHTML"
  hx-target="#instance-grid"
></div>

<script>
  (function () {
    window.__houndarrDashboardPageController?.abort();
    const controller = new AbortController();
    window.__houndarrDashboardPageController = controller;
    const { signal } = controller;

    const RUN_NOW_MIN_RUNNING_MS = 700;
    const RUN_NOW_SUCCESS_HOLD_MS = 900;
    const RUN_NOW_ERROR_HOLD_MS = 1100;
    const previousMetrics = new Map();

    function toNumber(value) {
      const parsed = Number(value);
      return Number.isFinite(parsed) ? parsed : 0;
    }

    function setRunNowButtonState(button, state) {
      const label = button.querySelector('[data-run-now-label]');
      const icon = button.querySelector('[data-run-now-icon]');

      button.classList.remove('is-running', 'is-success', 'is-error');
      if (icon) {
        icon.classList.remove('animate-spin');
      }

      if (state === 'running') {
        button.classList.add('is-running');
        button.disabled = true;
        button.setAttribute('aria-busy', 'true');
        if (label) {
          label.textContent = 'Running...';
        }
        if (icon) {
          icon.classList.add('animate-spin');
        }
        return;
      }

      button.disabled = false;
      button.setAttribute('aria-busy', 'false');

      if (state === 'success') {
        button.classList.add('is-success');
        if (label) {
          label.textContent = 'Queued';
        }
        return;
      }

      if (state === 'error') {
        button.classList.add('is-error');
        if (label) {
          label.textContent = 'Failed';
        }
        return;
      }

      if (label) {
        label.textContent = 'Run now';
      }
    }

    function completeRunNowRequest(button, statusCode) {
      const startedAt = Number(button.dataset.runNowStartedAt || 0);
      const elapsed = Math.max(0, Date.now() - startedAt);
      const waitForMin = Math.max(0, RUN_NOW_MIN_RUNNING_MS - elapsed);
      const outcome = statusCode >= 200 && statusCode < 300 ? 'success' : 'error';
      const holdMs = outcome === 'success' ? RUN_NOW_SUCCESS_HOLD_MS : RUN_NOW_ERROR_HOLD_MS;

      window.setTimeout(function () {
        if (!document.body.contains(button)) {
          return;
        }

        setRunNowButtonState(button, outcome);

        window.setTimeout(function () {
          if (!document.body.contains(button)) {
            return;
          }
          setRunNowButtonState(button, 'idle');
        }, holdMs);
      }, waitForMin);
    }

    // HTMX renders JSON from /api/status into the grid - we use a response
    // handler to convert the JSON array into cards.
    document.body.addEventListener(
      'htmx:beforeSwap',
      function (evt) {
        if (evt.detail.target.id !== 'instance-grid') return;

        let data;
        try {
          data = JSON.parse(evt.detail.serverResponse);
        } catch {
          return; // leave default swap behaviour
        }

        if (!Array.isArray(data)) return;

        if (data.length === 0) {
          evt.detail.serverResponse = `
        <div class="text-center py-20 text-slate-500">
          <svg class="w-16 h-16 mx-auto mb-4 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
          <p class="text-lg font-medium text-slate-400">No instances configured yet</p>
          <p class="mt-2 text-sm">
            <a href="/settings" hx-get="/settings" hx-target="#app-content" hx-swap="innerHTML" hx-push-url="true" class="text-brand-400 hover:text-brand-300">Add an instance</a>
            to get started.
          </p>
        </div>`;
          return;
        }

        const isInitialHydration = evt.detail.target.dataset.hydrated !== 'true';

        const totals24h = data.reduce(
          function (acc, inst) {
            acc.searched += toNumber(inst.searched_24h);
            acc.skipped += toNumber(inst.skipped_24h);
            acc.errors += toNumber(inst.errors_24h);
            return acc;
          },
          { searched: 0, skipped: 0, errors: 0 },
        );

        const summaryStripMarkup = `
      <section class="mb-6 grid grid-cols-3 gap-3" aria-label="Search activity (24h)">
        <div class="rounded-xl border border-slate-800 border-t-2 border-t-emerald-500/60 bg-slate-900/70 px-4 py-4 text-center">
          <p class="text-[11px] leading-4 uppercase tracking-wide text-emerald-400/70">Searched</p>
          <p class="mt-2 text-2xl font-bold tabular-nums text-emerald-200">${totals24h.searched}</p>
        </div>
        <div class="rounded-xl border border-slate-800 border-t-2 border-t-amber-500/50 bg-slate-900/70 px-4 py-4 text-center">
          <p class="text-[11px] leading-4 uppercase tracking-wide text-amber-400/70">Skipped</p>
          <p class="mt-2 text-2xl font-bold tabular-nums text-amber-200">${totals24h.skipped}</p>
        </div>
        <div class="rounded-xl border border-slate-800 border-t-2 border-t-rose-500/50 bg-slate-900/70 px-4 py-4 text-center">
          <p class="text-[11px] leading-4 uppercase tracking-wide text-rose-400/70">Errors</p>
          <p class="mt-2 text-2xl font-bold tabular-nums text-rose-200">${totals24h.errors}</p>
        </div>
      </section>`;

        const cards = data
          .map((inst, index) => {
            const previous = previousMetrics.get(inst.id);
            const lastHourChanged = previous && previous.searches_last_hour !== inst.searches_last_hour;
            const todayChanged = previous && previous.searches_today !== inst.searches_today;
            const totalChanged = previous && previous.items_found_total !== inst.items_found_total;
            const searched24hChanged = previous && previous.searched_24h !== toNumber(inst.searched_24h);
            const skipped24hChanged = previous && previous.skipped_24h !== toNumber(inst.skipped_24h);
            const errors24hChanged = previous && previous.errors_24h !== toNumber(inst.errors_24h);

            const badge = inst.enabled
              ? `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium bg-green-900/60 text-green-300">
             <span class="w-1.5 h-1.5 rounded-full bg-green-400 inline-block"></span> Active
           </span>`
              : `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium bg-slate-700 text-slate-400">
             <span class="w-1.5 h-1.5 rounded-full bg-slate-500 inline-block"></span> Disabled
           </span>`;

            const typeBadgeMap = {
              sonarr:  '<span class="text-xs font-mono bg-sky-900/50 text-sky-300 px-2 py-0.5 rounded">Sonarr</span>',
              radarr:  '<span class="text-xs font-mono bg-amber-900/50 text-amber-300 px-2 py-0.5 rounded">Radarr</span>',
              lidarr:  '<span class="text-xs font-mono bg-emerald-900/50 text-emerald-300 px-2 py-0.5 rounded">Lidarr</span>',
              readarr: '<span class="text-xs font-mono bg-red-900/50 text-red-300 px-2 py-0.5 rounded">Readarr</span>',
              whisparr:'<span class="text-xs font-mono bg-pink-900/50 text-pink-300 px-2 py-0.5 rounded">Whisparr</span>',
            };
            const typeBadge = typeBadgeMap[inst.type] || typeBadgeMap.sonarr;

            const lastSearch = inst.last_search_at ? formatLocalTimestamp(inst.last_search_at) : 'Never';

            const activityLabelMap = {
              searched: 'Searched',
              skipped: 'Skipped',
              error: 'Error',
            };
            const lastActivity = inst.last_activity_at
              ? `${activityLabelMap[inst.last_activity_action] || 'Activity'} at ${formatLocalTimestamp(inst.last_activity_at)}`
              : 'No activity in recent history';

            const queueLimit = toNumber(inst.queue_limit);
            const policyChips = [
              `Every ${toNumber(inst.sleep_interval_mins)}m`,
              `Batch ${toNumber(inst.batch_size)}`,
              `Cap/h ${toNumber(inst.hourly_cap)}`,
              `Cooldown ${toNumber(inst.cooldown_days)}d`,
              `Grace ${toNumber(inst.post_release_grace_hrs)}h`,
              queueLimit > 0 ? `Queue limit ${queueLimit}` : null,
              inst.cutoff_enabled ? `Cutoff on (${toNumber(inst.cutoff_batch_size)})` : 'Cutoff off',
            ].filter(Boolean)
              .map(function (label) {
                return `<span class="rounded-md border border-slate-700 bg-slate-800/60 px-2 py-1 text-[11px] text-slate-300">${label}</span>`;
              })
              .join('');

            const animationDelay = Math.min(index * 40, 220);

            previousMetrics.set(inst.id, {
              searches_last_hour: inst.searches_last_hour,
              searches_today: inst.searches_today,
              items_found_total: inst.items_found_total,
              searched_24h: toNumber(inst.searched_24h),
              skipped_24h: toNumber(inst.skipped_24h),
              errors_24h: toNumber(inst.errors_24h),
            });

            const entryClass = isInitialHydration ? ' is-entering' : '';

            return `
        <div class="instance-card${entryClass} bg-slate-900 border border-slate-800 rounded-xl p-5 flex flex-col gap-4" style="animation-delay: ${animationDelay}ms;">
          <!-- Header -->
          <div class="flex items-start justify-between gap-3">
            <div>
              <div class="flex items-center gap-2 flex-wrap">
                <h2 class="text-base font-semibold text-white">${escHtml(inst.name)}</h2>
                ${typeBadge}
              </div>
              <div class="mt-1">${badge}</div>
            </div>
            <button
              hx-post="/api/instances/${inst.id}/run-now"
              hx-swap="none"
              data-run-now-btn="true"
              data-instance-id="${inst.id}"
              title="Run search now"
              class="shrink-0 flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium
                     bg-brand-600 hover:bg-brand-500 text-white transition-colors disabled:opacity-50">
              <svg data-run-now-icon class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
              <span data-run-now-label>Run now</span>
            </button>
          </div>

          <!-- Stats grid -->
          <dl class="grid grid-cols-1 sm:grid-cols-3 gap-3 text-center">
            <div class="bg-slate-800/60 rounded-lg px-3 py-2 ${lastHourChanged ? 'metric-changed' : ''}">
              <dt class="text-[11px] leading-4 text-slate-500 uppercase tracking-wide">Last hour</dt>
              <dd class="text-lg font-bold tabular-nums text-white mt-1">${inst.searches_last_hour}</dd>
            </div>
            <div class="bg-slate-800/60 rounded-lg px-3 py-2 ${todayChanged ? 'metric-changed' : ''}">
              <dt class="text-[11px] leading-4 text-slate-500 uppercase tracking-wide">Today</dt>
              <dd class="text-lg font-bold tabular-nums text-white mt-1">${inst.searches_today}</dd>
            </div>
            <div class="bg-slate-800/60 rounded-lg px-3 py-2 ${totalChanged ? 'metric-changed' : ''}">
              <dt class="text-[11px] leading-4 text-slate-500 uppercase tracking-wide">Total</dt>
              <dd class="text-lg font-bold tabular-nums text-white mt-1">${inst.items_found_total}</dd>
            </div>
          </dl>

          <dl class="grid grid-cols-1 sm:grid-cols-3 gap-3 text-center">
            <div class="bg-emerald-950/35 rounded-lg px-3 py-2 border border-emerald-900/40 ${searched24hChanged ? 'metric-changed' : ''}">
              <dt class="text-[11px] leading-4 text-emerald-300/80 uppercase tracking-wide">24h searched</dt>
              <dd class="text-lg font-bold tabular-nums text-emerald-200 mt-1">${toNumber(inst.searched_24h)}</dd>
            </div>
            <div class="bg-amber-950/30 rounded-lg px-3 py-2 border border-amber-900/40 ${skipped24hChanged ? 'metric-changed' : ''}">
              <dt class="text-[11px] leading-4 text-amber-300/80 uppercase tracking-wide">24h skipped</dt>
              <dd class="text-lg font-bold tabular-nums text-amber-200 mt-1">${toNumber(inst.skipped_24h)}</dd>
            </div>
            <div class="bg-rose-950/30 rounded-lg px-3 py-2 border border-rose-900/40 ${errors24hChanged ? 'metric-changed' : ''}">
              <dt class="text-[11px] leading-4 text-rose-300/80 uppercase tracking-wide">24h errors</dt>
              <dd class="text-lg font-bold tabular-nums text-rose-200 mt-1">${toNumber(inst.errors_24h)}</dd>
            </div>
          </dl>

          <div class="space-y-1.5 text-xs text-slate-400">
            <p>Last activity: <span class="text-slate-300">${lastActivity}</span></p>
            <p>Last searched: <span class="text-slate-300">${lastSearch}</span></p>
          </div>

          <div class="flex flex-wrap gap-1.5">
            ${policyChips}
          </div>
        </div>`;
          })
          .join('');

        evt.detail.serverResponse = `${summaryStripMarkup}<div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">${cards}</div>`;
        evt.detail.target.dataset.hydrated = 'true';
      },
      { signal },
    );

    function escHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    const formatLocalTimestamp =
      window.houndarrClientHelpers?.formatLocalTimestamp ||
      function (isoTimestamp) {
        const parsed = new Date(isoTimestamp);
        if (Number.isNaN(parsed.getTime())) {
          return isoTimestamp;
        }

        return new Intl.DateTimeFormat(undefined, {
          year: 'numeric',
          month: '2-digit',
          day: '2-digit',
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit',
          hour12: false,
          timeZoneName: 'short',
        }).format(parsed);
      };

    document.body.addEventListener(
      'htmx:beforeRequest',
      function (evt) {
        const triggerEl = evt.detail.elt;
        if (!triggerEl || !triggerEl.matches('[data-run-now-btn="true"]')) {
          return;
        }

        triggerEl.dataset.runNowStartedAt = String(Date.now());
        setRunNowButtonState(triggerEl, 'running');
      },
      { signal },
    );

    document.body.addEventListener(
      'htmx:afterRequest',
      function (evt) {
        const triggerEl = evt.detail.elt;
        if (!triggerEl || !triggerEl.matches('[data-run-now-btn="true"]')) {
          return;
        }

        const statusCode = evt.detail.xhr ? evt.detail.xhr.status : 0;
        completeRunNowRequest(triggerEl, statusCode);
      },
      { signal },
    );
  })();
</script>
