<div class="sr-only" data-page-key="dashboard" data-page-title="Dashboard | Houndarr" aria-hidden="true"></div>

<style>
  #instance-grid.is-entering {
    animation: instance-grid-enter var(--dur-base, 180ms) var(--ease-station, cubic-bezier(0.16,1,0.3,1));
  }

  @keyframes instance-grid-enter {
    from { opacity: 0.65; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .metric-changed {
    animation: metric-pulse 360ms var(--ease-station, cubic-bezier(0.16,1,0.3,1));
  }

  @keyframes metric-pulse {
    0% {
      background-color: rgba(6, 182, 212, 0.20);
      box-shadow: 0 0 0 1px rgba(34, 211, 238, 0.28) inset;
    }
    100% {
      background-color: rgba(21, 27, 39, 0.70);
      box-shadow: 0 0 0 0 rgba(34, 211, 238, 0);
    }
  }

  [data-run-now-btn="true"] {
    transition:
      background-color var(--dur-base, 180ms) var(--ease-station, cubic-bezier(0.16,1,0.3,1)),
      color            var(--dur-base, 180ms) var(--ease-station, cubic-bezier(0.16,1,0.3,1)),
      box-shadow       var(--dur-base, 180ms) var(--ease-station, cubic-bezier(0.16,1,0.3,1)),
      transform        var(--dur-base, 180ms) var(--ease-station, cubic-bezier(0.16,1,0.3,1));
  }

  [data-run-now-btn="true"].is-running {
    background-color: rgb(14 116 144);
    color: rgb(207 250 254);
    box-shadow: 0 0 0 1px rgba(34, 211, 238, 0.35) inset;
  }

  [data-run-now-btn="true"].is-success {
    background-color: rgb(22 101 52);
    color: rgb(220 252 231);
    box-shadow: 0 0 0 1px rgba(74, 222, 128, 0.38) inset;
  }

  [data-run-now-btn="true"].is-error {
    background-color: rgb(127 29 29);
    color: rgb(254 226 226);
    box-shadow: 0 0 0 1px rgba(248, 113, 113, 0.40) inset;
    animation: run-now-shake 280ms var(--ease-station, cubic-bezier(0.16,1,0.3,1));
  }

  @keyframes run-now-shake {
    0%, 100% { transform: translateX(0); }
    20%      { transform: translateX(-3px); }
    40%      { transform: translateX(3px); }
    60%      { transform: translateX(-2px); }
    80%      { transform: translateX(2px); }
  }

  @media (prefers-reduced-motion: reduce) {
    #instance-grid.is-entering,
    .metric-changed {
      transition: none;
      animation: none;
      opacity: 1;
      transform: none;
    }
    [data-run-now-btn="true"].is-error {
      animation: none;
    }
  }
</style>

<div class="flex items-center justify-between mb-6">
  <h1 class="text-xl font-bold text-white tracking-tight">Dashboard</h1>
  <a
    href="/settings"
    hx-get="/settings"
    hx-target="#app-content"
    hx-swap="innerHTML"
    hx-push-url="true"
    class="text-sm text-brand-400 hover:text-brand-300 transition-colors font-medium"
  >+ Add Instance</a>
</div>

<!-- Instance grid: polled every 15 s via HTMX -->
<div
  id="instance-grid"
  data-hydrated="false"
  hx-get="/api/status"
  hx-trigger="load, every 30s"
  hx-swap="innerHTML"
  hx-target="#instance-grid"
></div>

<script>
  (function () {
    window.__houndarrDashboardPageController?.abort();
    const controller = new AbortController();
    window.__houndarrDashboardPageController = controller;
    const { signal } = controller;

    const RUN_NOW_MIN_RUNNING_MS  = 700;
    const RUN_NOW_SUCCESS_HOLD_MS = 900;
    const RUN_NOW_ERROR_HOLD_MS   = 1100;
    const previousMetrics = new Map();
    let gridInitialHydration = false;

    function toNumber(value) {
      const parsed = Number(value);
      return Number.isFinite(parsed) ? parsed : 0;
    }

    function setRunNowButtonState(button, state) {
      const label = button.querySelector('[data-run-now-label]');
      const icon  = button.querySelector('[data-run-now-icon]');

      button.classList.remove('is-running', 'is-success', 'is-error');
      if (icon) icon.classList.remove('animate-spin');

      if (state === 'running') {
        button.classList.add('is-running');
        button.disabled = true;
        button.setAttribute('aria-busy', 'true');
        if (label) label.textContent = 'Running…';
        if (icon)  icon.classList.add('animate-spin');
        return;
      }

      button.disabled = false;
      button.setAttribute('aria-busy', 'false');

      if (state === 'success') {
        button.classList.add('is-success');
        if (label) label.textContent = 'Queued';
        return;
      }
      if (state === 'error') {
        button.classList.add('is-error');
        if (label) label.textContent = 'Failed';
        return;
      }
      if (label) label.textContent = 'Run now';
    }

    function completeRunNowRequest(button, statusCode) {
      const startedAt  = Number(button.dataset.runNowStartedAt || 0);
      const elapsed    = Math.max(0, Date.now() - startedAt);
      const waitForMin = Math.max(0, RUN_NOW_MIN_RUNNING_MS - elapsed);
      const outcome    = statusCode >= 200 && statusCode < 300 ? 'success' : 'error';
      const holdMs     = outcome === 'success' ? RUN_NOW_SUCCESS_HOLD_MS : RUN_NOW_ERROR_HOLD_MS;

      window.setTimeout(function () {
        if (!document.body.contains(button)) return;
        setRunNowButtonState(button, outcome);
        window.setTimeout(function () {
          if (!document.body.contains(button)) return;
          setRunNowButtonState(button, 'idle');
        }, holdMs);
      }, waitForMin);
    }

    // Type → color map (Station palette, unified saturation)
    const TYPE_COLOR_MAP = {
      sonarr:   '#7dd3fc',
      radarr:   '#fcd34d',
      lidarr:   '#6ee7b7',
      readarr:  '#fca5a5',
      whisparr_v2: '#f9a8d4',
      whisparr_v3: '#e879f9',
    };

    document.body.addEventListener(
      'htmx:beforeSwap',
      function (evt) {
        if (evt.detail.target.id !== 'instance-grid') return;

        let data;
        try { data = JSON.parse(evt.detail.serverResponse); } catch { return; }
        if (!Array.isArray(data)) return;

        // ── Empty state ────────────────────────────────────────────────
        if (data.length === 0) {
          evt.detail.serverResponse = `
<div class="text-center py-20 text-slate-500">
  <svg class="w-14 h-14 mx-auto mb-5 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
      d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
  </svg>
  <p class="text-base font-semibold text-slate-400 tracking-tight">No instances configured yet</p>
  <p class="mt-2 text-sm text-slate-500">
    <a href="/settings" hx-get="/settings" hx-target="#app-content" hx-swap="innerHTML"
       hx-push-url="true" class="text-brand-400 hover:text-brand-300 underline underline-offset-2">Add an instance</a>
    in Settings to get started.
  </p>
</div>`;
          return;
        }

        const isInitialHydration = evt.detail.target.dataset.hydrated !== 'true';
        gridInitialHydration = isInitialHydration;

        // ── Summary strip totals ───────────────────────────────────────
        const totals24h = data.reduce(
          function (acc, inst) {
            acc.searched += toNumber(inst.searched_24h);
            acc.skipped  += toNumber(inst.skipped_24h);
            acc.errors   += toNumber(inst.errors_24h);
            return acc;
          },
          { searched: 0, skipped: 0, errors: 0 },
        );

        const summaryStripMarkup = `
<section class="mb-6 grid grid-cols-3 gap-3" aria-label="Search activity (24h)">
  <div class="rounded-xl border border-[#1e2638] border-t-2 border-t-emerald-500/70 bg-[#0e1117] px-4 py-4 text-center" style="box-shadow:var(--shadow-1);">
    <p class="text-[10px] leading-4 uppercase tracking-widest font-sans text-emerald-400/75">Searched</p>
    <p class="mt-2 text-2xl font-bold tabular-nums font-mono text-emerald-200">${totals24h.searched}</p>
  </div>
  <div class="rounded-xl border border-[#1e2638] border-t-2 border-t-amber-500/60 bg-[#0e1117] px-4 py-4 text-center" style="box-shadow:var(--shadow-1);">
    <p class="text-[10px] leading-4 uppercase tracking-widest font-sans text-amber-400/75">Skipped</p>
    <p class="mt-2 text-2xl font-bold tabular-nums font-mono text-amber-200">${totals24h.skipped}</p>
  </div>
  <div class="rounded-xl border border-[#1e2638] border-t-2 border-t-rose-500/60 bg-[#0e1117] px-4 py-4 text-center" style="box-shadow:var(--shadow-1);">
    <p class="text-[10px] leading-4 uppercase tracking-widest font-sans text-rose-400/75">Errors</p>
    <p class="mt-2 text-2xl font-bold tabular-nums font-mono text-rose-200">${totals24h.errors}</p>
  </div>
</section>`;

        // ── Instance cards ─────────────────────────────────────────────
        const cards = data
          .map((inst, index) => {
            const previous         = previousMetrics.get(inst.id);
            const lastHourChanged  = previous && previous.searches_last_hour !== inst.searches_last_hour;
            const todayChanged     = previous && previous.searches_today     !== inst.searches_today;
            const totalChanged     = previous && previous.items_found_total  !== inst.items_found_total;
            const searched24hChanged = previous && previous.searched_24h !== toNumber(inst.searched_24h);
            const skipped24hChanged  = previous && previous.skipped_24h  !== toNumber(inst.skipped_24h);
            const errors24hChanged   = previous && previous.errors_24h   !== toNumber(inst.errors_24h);

            // Status badge: pulsing dot for active
            const badge = inst.enabled
              ? `<span class="inline-flex items-center gap-1.5 px-2 py-0.5 rounded-full text-xs font-medium bg-emerald-950/50 text-emerald-300 border border-emerald-800/40">
                   <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 inline-block station-pulse-dot"></span> Active
                 </span>`
              : `<span class="inline-flex items-center gap-1.5 px-2 py-0.5 rounded-full text-xs font-medium bg-[#151b27] text-slate-500 border border-[#2a3448]">
                   <span class="w-1.5 h-1.5 rounded-full bg-slate-600 inline-block"></span> Disabled
                 </span>`;

            // Type badge
            const typeBadgeMap = {
              sonarr:   `<span class="text-xs font-mono bg-sky-950/60 text-sky-300 px-2 py-0.5 rounded border border-sky-900/50">Sonarr</span>`,
              radarr:   `<span class="text-xs font-mono bg-amber-950/60 text-amber-300 px-2 py-0.5 rounded border border-amber-900/50">Radarr</span>`,
              lidarr:   `<span class="text-xs font-mono bg-emerald-950/60 text-emerald-300 px-2 py-0.5 rounded border border-emerald-900/50">Lidarr</span>`,
              readarr:  `<span class="text-xs font-mono bg-rose-950/60 text-rose-300 px-2 py-0.5 rounded border border-rose-900/50">Readarr</span>`,
              whisparr_v2: `<span class="text-xs font-mono bg-pink-950/60 text-pink-300 px-2 py-0.5 rounded border border-pink-900/50">Whisparr v2</span>`,
              whisparr_v3: `<span class="text-xs font-mono bg-fuchsia-950/60 text-fuchsia-300 px-2 py-0.5 rounded border border-fuchsia-900/50">Whisparr v3</span>`,
            };
            const typeBadge = typeBadgeMap[inst.type] || typeBadgeMap.sonarr;

            // Left border color: signature Station type indicator
            const typeColor = TYPE_COLOR_MAP[inst.type] || TYPE_COLOR_MAP.sonarr;

            const lastSearch   = inst.last_search_at ? formatLocalTimestamp(inst.last_search_at) : 'Never';

            const activityLabelMap = { searched: 'Searched', skipped: 'Skipped', error: 'Error' };
            const lastActivity = inst.last_activity_at
              ? `${activityLabelMap[inst.last_activity_action] || 'Activity'} at ${formatLocalTimestamp(inst.last_activity_at)}`
              : 'No activity in recent history';

            const queueLimit = toNumber(inst.queue_limit);
            const policyChips = [
              `Every ${toNumber(inst.sleep_interval_mins)}m`,
              `Batch ${toNumber(inst.batch_size)}`,
              `Cap/h ${toNumber(inst.hourly_cap)}`,
              `Cooldown ${toNumber(inst.cooldown_days)}d`,
              `Grace ${toNumber(inst.post_release_grace_hrs)}h`,
              queueLimit > 0 ? `Queue ≤${queueLimit}` : null,
              inst.cutoff_enabled ? `Cutoff (${toNumber(inst.cutoff_batch_size)})` : 'No cutoff',
            ].filter(Boolean)
              .map(function (label) {
                return `<span class="rounded border border-[#2a3448] bg-[#151b27] px-2 py-0.5 text-[10px] font-mono text-slate-400">${label}</span>`;
              })
              .join('');

            previousMetrics.set(inst.id, {
              searches_last_hour: inst.searches_last_hour,
              searches_today:     inst.searches_today,
              items_found_total:  inst.items_found_total,
              searched_24h: toNumber(inst.searched_24h),
              skipped_24h:  toNumber(inst.skipped_24h),
              errors_24h:   toNumber(inst.errors_24h),
            });

            return `
<div class="instance-card bg-[#0e1117] border border-[#1e2638] rounded-xl p-5 flex flex-col gap-4"
     style="border-left:3px solid ${typeColor}; box-shadow:var(--shadow-2);">

  <!-- Header: name + type, status badge, run-now -->
  <div class="flex items-start justify-between gap-3">
    <div>
      <div class="flex items-center gap-2 flex-wrap">
        <h2 class="text-base font-semibold text-white tracking-tight">${escHtml(inst.name)}</h2>
        ${typeBadge}
      </div>
      <div class="mt-1.5">${badge}</div>
    </div>
    <button
      hx-post="/api/instances/${inst.id}/run-now"
      hx-swap="none"
      data-run-now-btn="true"
      data-instance-id="${inst.id}"
      title="Trigger search now"
      class="shrink-0 flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium
             bg-brand-600 hover:bg-brand-500 text-white transition-colors disabled:opacity-50">
      <svg data-run-now-icon class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      <span data-run-now-label>Run now</span>
    </button>
  </div>

  <!-- Search count grid -->
  <dl class="grid grid-cols-3 gap-2 text-center">
    <div class="bg-[#151b27] border border-[#1e2638] rounded-lg px-3 py-2 ${lastHourChanged ? 'metric-changed' : ''}">
      <dt class="text-[10px] text-slate-500 uppercase tracking-widest font-sans">Last hour</dt>
      <dd class="text-lg font-bold tabular-nums font-mono text-white mt-1">${inst.searches_last_hour}</dd>
    </div>
    <div class="bg-[#151b27] border border-[#1e2638] rounded-lg px-3 py-2 ${todayChanged ? 'metric-changed' : ''}">
      <dt class="text-[10px] text-slate-500 uppercase tracking-widest font-sans">Today</dt>
      <dd class="text-lg font-bold tabular-nums font-mono text-white mt-1">${inst.searches_today}</dd>
    </div>
    <div class="bg-[#151b27] border border-[#1e2638] rounded-lg px-3 py-2 ${totalChanged ? 'metric-changed' : ''}">
      <dt class="text-[10px] text-slate-500 uppercase tracking-widest font-sans">Total</dt>
      <dd class="text-lg font-bold tabular-nums font-mono text-white mt-1">${inst.items_found_total}</dd>
    </div>
  </dl>

  <!-- 24h status grid -->
  <dl class="grid grid-cols-3 gap-2 text-center">
    <div class="bg-emerald-950/30 rounded-lg px-3 py-2 border border-emerald-900/35 ${searched24hChanged ? 'metric-changed' : ''}">
      <dt class="text-[10px] text-emerald-400/75 uppercase tracking-widest font-sans">24h searched</dt>
      <dd class="text-lg font-bold tabular-nums font-mono text-emerald-200 mt-1">${toNumber(inst.searched_24h)}</dd>
    </div>
    <div class="bg-amber-950/25 rounded-lg px-3 py-2 border border-amber-900/35 ${skipped24hChanged ? 'metric-changed' : ''}">
      <dt class="text-[10px] text-amber-400/75 uppercase tracking-widest font-sans">24h skipped</dt>
      <dd class="text-lg font-bold tabular-nums font-mono text-amber-200 mt-1">${toNumber(inst.skipped_24h)}</dd>
    </div>
    <div class="bg-rose-950/25 rounded-lg px-3 py-2 border border-rose-900/35 ${errors24hChanged ? 'metric-changed' : ''}">
      <dt class="text-[10px] text-rose-400/75 uppercase tracking-widest font-sans">24h errors</dt>
      <dd class="text-lg font-bold tabular-nums font-mono text-rose-200 mt-1">${toNumber(inst.errors_24h)}</dd>
    </div>
  </dl>

  <!-- Activity timestamps -->
  <div class="space-y-1 text-xs text-slate-500">
    <p class="font-sans">Last activity: <span class="text-slate-300 font-mono">${lastActivity}</span></p>
    <p class="font-sans">Last searched: <span class="text-slate-300 font-mono">${lastSearch}</span></p>
  </div>

  <!-- Policy chips -->
  <div class="flex flex-wrap gap-1.5">
    ${policyChips}
  </div>
</div>`;
          })
          .join('');

        evt.detail.serverResponse = `${summaryStripMarkup}<div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">${cards}</div>`;
        evt.detail.target.dataset.hydrated = 'true';
      },
      { signal },
    );

    function escHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    const formatLocalTimestamp =
      window.houndarrClientHelpers?.formatLocalTimestamp ||
      function (isoTimestamp) {
        const parsed = new Date(isoTimestamp);
        if (Number.isNaN(parsed.getTime())) return isoTimestamp;
        return new Intl.DateTimeFormat(undefined, {
          year: 'numeric', month: '2-digit', day: '2-digit',
          hour: '2-digit', minute: '2-digit', second: '2-digit',
          hour12: false, timeZoneName: 'short',
        }).format(parsed);
      };

    document.body.addEventListener(
      'htmx:afterSwap',
      function (evt) {
        if (evt.detail.target.id !== 'instance-grid') return;
        if (!gridInitialHydration) return;
        gridInitialHydration = false;
        const grid = evt.detail.target;
        grid.classList.add('is-entering');
        window.setTimeout(function () { grid.classList.remove('is-entering'); }, 200);
      },
      { signal },
    );

    document.body.addEventListener(
      'htmx:beforeRequest',
      function (evt) {
        const triggerEl = evt.detail.elt;
        if (!triggerEl || !triggerEl.matches('[data-run-now-btn="true"]')) return;
        triggerEl.dataset.runNowStartedAt = String(Date.now());
        setRunNowButtonState(triggerEl, 'running');
      },
      { signal },
    );

    document.body.addEventListener(
      'htmx:afterRequest',
      function (evt) {
        const triggerEl = evt.detail.elt;
        if (!triggerEl || !triggerEl.matches('[data-run-now-btn="true"]')) return;
        const statusCode = evt.detail.xhr ? evt.detail.xhr.status : 0;
        completeRunNowRequest(triggerEl, statusCode);
      },
      { signal },
    );
  })();
</script>
