<div class="sr-only" data-page-key="logs" data-page-title="Logs — Houndarr" aria-hidden="true"></div>

<style>
  #logs-table-shell {
    transition: opacity 140ms ease;
  }

  #logs-table-shell.is-loading {
    opacity: 0.6;
  }

  #log-tbody tr.htmx-added {
    animation: log-row-enter 180ms ease-out;
  }

  @keyframes log-row-enter {
    from {
      opacity: 0;
      transform: translateY(4px);
    }

    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @media (prefers-reduced-motion: reduce) {
    #logs-table-shell {
      transition: none;
    }

    #log-tbody tr.htmx-added {
      animation: none;
    }
  }
</style>

<div class="flex items-center justify-between mb-6">
  <h1 class="text-2xl font-bold text-white">Search Logs</h1>
  <button
    id="copy-visible-logs-btn-mobile"
    type="button"
    class="sm:hidden inline-flex items-center justify-center w-[9.5rem] flex-shrink-0 px-3 py-2 rounded-lg bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-200 text-sm font-medium transition-colors duration-300 ease-out"
  >
    <span class="copy-visible-logs-label transition-opacity duration-200 ease-out">Copy visible rows</span>
  </button>
</div>

<form
  id="log-filter-form"
  hx-get="/api/logs/partial"
  hx-target="#log-tbody"
  hx-swap="innerHTML"
  hx-trigger="change, submit"
  hx-indicator="#log-spinner"
  class="flex flex-wrap items-end gap-3 mb-5"
>
  <div class="flex flex-col gap-1 min-w-[180px]">
    <label for="filter-instance" class="text-xs text-slate-400 font-medium">Instance</label>
    <select
      id="filter-instance"
      name="instance_id"
      class="bg-slate-800 border border-slate-700 text-slate-200 text-sm rounded-lg px-3 py-2
                    focus:outline-none focus:ring-1 focus:ring-brand-500 focus:border-brand-500"
    >
      <option value="">All instances</option>
      {% for inst in instances %}
      <option value="{{ inst.id }}" {% if selected_instance_id == inst.id %}selected{% endif %}>
        {{ inst.name }}
      </option>
      {% endfor %}
    </select>
  </div>

  <div class="flex flex-col gap-1">
    <label for="filter-action" class="text-xs text-slate-400 font-medium">Action</label>
    <select
      id="filter-action"
      name="action"
      class="bg-slate-800 border border-slate-700 text-slate-200 text-sm rounded-lg px-3 py-2
                    focus:outline-none focus:ring-1 focus:ring-brand-500 focus:border-brand-500"
    >
      <option value="">All actions</option>
      <option value="searched" {% if selected_action == "searched" %}selected{% endif %}>Searched</option>
      <option value="skipped" {% if selected_action == "skipped" %}selected{% endif %}>Skipped</option>
      <option value="error" {% if selected_action == "error" %}selected{% endif %}>Error</option>
      <option value="info" {% if selected_action == "info" %}selected{% endif %}>Info</option>
    </select>
  </div>

  <div class="flex flex-col gap-1">
    <label for="filter-limit" class="text-xs text-slate-400 font-medium">Rows</label>
    <select
      id="filter-limit"
      name="limit"
      class="bg-slate-800 border border-slate-700 text-slate-200 text-sm rounded-lg px-3 py-2
                    focus:outline-none focus:ring-1 focus:ring-brand-500 focus:border-brand-500"
    >
      <option value="25">25</option>
      <option value="50" selected>50</option>
      <option value="100">100</option>
      <option value="200">200</option>
      <option value="300">300</option>
      <option value="500">500</option>
    </select>
  </div>

  <div class="flex flex-col gap-1">
    <label for="filter-search-kind" class="text-xs text-slate-400 font-medium">Kind</label>
    <select
      id="filter-search-kind"
      name="search_kind"
      class="bg-slate-800 border border-slate-700 text-slate-200 text-sm rounded-lg px-3 py-2
                    focus:outline-none focus:ring-1 focus:ring-brand-500 focus:border-brand-500"
    >
      <option value="">All kinds</option>
      <option value="missing" {% if selected_search_kind == "missing" %}selected{% endif %}>Missing</option>
      <option value="cutoff" {% if selected_search_kind == "cutoff" %}selected{% endif %}>Cutoff</option>
    </select>
  </div>

  <div class="flex flex-col gap-1">
    <label for="filter-cycle-trigger" class="text-xs text-slate-400 font-medium">Trigger</label>
    <select
      id="filter-cycle-trigger"
      name="cycle_trigger"
      class="bg-slate-800 border border-slate-700 text-slate-200 text-sm rounded-lg px-3 py-2
                    focus:outline-none focus:ring-1 focus:ring-brand-500 focus:border-brand-500"
    >
      <option value="">All triggers</option>
      <option value="scheduled" {% if selected_cycle_trigger == "scheduled" %}selected{% endif %}>Scheduled</option>
      <option value="run_now" {% if selected_cycle_trigger == "run_now" %}selected{% endif %}>Run now</option>
      <option value="system" {% if selected_cycle_trigger == "system" %}selected{% endif %}>System</option>
    </select>
  </div>

  <div class="flex items-center gap-2 pb-2">
    <input
      id="filter-hide-system"
      name="hide_system"
      type="checkbox"
      value="true"
      {% if selected_hide_system %}checked{% endif %}
      class="w-4 h-4 rounded border-slate-600 bg-slate-800 text-brand-500 focus:ring-brand-500 focus:ring-offset-0"
    />
    <label for="filter-hide-system" class="text-xs text-slate-300 font-medium">Hide system rows</label>
  </div>

  <div id="log-spinner" class="htmx-indicator flex items-center gap-2 text-xs text-slate-400 pb-2">
    <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
    </svg>
    Loading...
  </div>
</form>

<div class="flex items-center justify-between gap-4 mb-4">
  <div id="logs-summary">
    {% include "partials/log_summary.html" %}
  </div>
  <button
    id="copy-visible-logs-btn"
    type="button"
    class="hidden sm:inline-flex items-center justify-center w-[9.5rem] flex-shrink-0 px-3 py-2 rounded-lg bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-200 text-sm font-medium transition-colors duration-300 ease-out"
  >
    <span id="copy-visible-logs-label" class="transition-opacity duration-200 ease-out">Copy visible rows</span>
  </button>
</div>

<div
  id="logs-table-shell"
  class="overflow-x-auto overflow-y-auto max-h-none sm:max-h-[calc(100vh-18rem)] rounded-xl border border-slate-800 bg-slate-900"
>
  <table class="w-full text-left text-sm">
    <thead class="border-b border-slate-800 sticky top-0 bg-slate-900 z-10">
      <tr class="text-[11px] uppercase tracking-wide text-slate-500">
        <th class="px-3 py-2.5 font-medium">Timestamp (Local)</th>
        <th class="px-3 py-2.5 font-medium">Instance</th>
        <th class="px-3 py-2.5 font-medium">Action</th>
        <th class="px-3 py-2.5 font-medium">Type</th>
        <th class="px-3 py-2.5 font-medium">Kind</th>
        <th class="px-3 py-2.5 font-medium">Trigger</th>
        <th class="px-3 py-2.5 font-medium">Cycle</th>
        <th class="px-3 py-2.5 font-medium">Cycle outcome</th>
        <th class="px-3 py-2.5 font-medium">Media</th>
        <th class="px-3 py-2.5 font-medium">Reason / Message</th>
      </tr>
    </thead>
    <tbody id="log-tbody">
      {% include "partials/log_rows.html" %}
    </tbody>
  </table>
</div>

<script>
  (function () {
    window.__houndarrLogsPageController?.abort();
    const controller = new AbortController();
    window.__houndarrLogsPageController = controller;
    const { signal } = controller;

    function formatLocalTimestamp(isoTimestamp) {
      if (!isoTimestamp) {
        return '—';
      }

      const parsed = new Date(isoTimestamp);
      if (Number.isNaN(parsed.getTime())) {
        return isoTimestamp;
      }

      return new Intl.DateTimeFormat(undefined, {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false,
        timeZoneName: 'short',
      }).format(parsed);
    }

    function formatVisibleLogTimestamps(root = document) {
      root.querySelectorAll('[data-log-ts]').forEach((el) => {
        if (el.getAttribute('data-ts-formatted') === 'true') {
          return;
        }
        const ts = el.getAttribute('data-log-ts') || '';
        el.textContent = formatLocalTimestamp(ts);
        el.setAttribute('data-ts-formatted', 'true');
      });
    }

    function escapePipes(value) {
      return String(value).replaceAll('|', '\\|').replaceAll('\n', ' ');
    }

    function copyVisibleLogRows() {
      const rows = Array.from(document.querySelectorAll('#log-tbody tr[data-log-row="true"]'));

      if (rows.length === 0) {
        return;
      }

      const header = ['Timestamp (Local)', 'Instance', 'Action', 'Type', 'Kind', 'Trigger', 'Cycle', 'Cycle outcome', 'Media', 'Reason / Message'];
      const divider = ['---', '---', '---', '---', '---', '---', '---', '---', '---', '---'];
      const lines = [`| ${header.join(' | ')} |`, `| ${divider.join(' | ')} |`];

      rows.forEach((row) => {
        const values = [
          row.querySelector('[data-col="timestamp"]')?.textContent?.trim() || '—',
          row.querySelector('[data-col="instance"]')?.textContent?.trim() || '—',
          row.querySelector('[data-col="action"]')?.textContent?.trim() || '—',
          row.querySelector('[data-col="type"]')?.textContent?.trim() || '—',
          row.querySelector('[data-col="kind"]')?.textContent?.trim() || '—',
          row.querySelector('[data-col="trigger"]')?.textContent?.trim() || '—',
          row.querySelector('[data-col="cycle"]')?.textContent?.trim() || '—',
          row.querySelector('[data-col="outcome"]')?.textContent?.trim() || '—',
          row.querySelector('[data-col="media"]')?.textContent?.replace(/\s+/g, ' ').trim() || '—',
          row.querySelector('[data-col="reason"]')?.textContent?.trim() || '—',
        ].map(escapePipes);

        lines.push(`| ${values.join(' | ')} |`);
      });

      navigator.clipboard
        .writeText(lines.join('\n'))
        .then(() => {
          flashCopyButtonState('success');
        })
        .catch(() => {
          flashCopyButtonState('error');
        });
    }

    function setSummaryValue(id, value) {
      const el = document.getElementById(id);
      if (!el) {
        return;
      }
      el.textContent = String(value);
    }

    const summaryState = {
      totalRows: 0,
      searchedRows: 0,
      skippedRows: 0,
      errorRows: 0,
      infoRows: 0,
      legacyRows: 0,
      totalCycles: 0,
      searchedCycles: 0,
      skipOnlyCycles: 0,
      unknownCycles: 0,
      cycleProgressById: new Map(),
    };

    function mergeCycleProgress(current, incoming) {
      if (current === 'progress' || incoming === 'progress') {
        return 'progress';
      }
      if (current) {
        return current;
      }
      return incoming || 'unknown';
    }

    function adjustCycleBucket(status, delta) {
      if (status === 'progress') {
        summaryState.searchedCycles += delta;
        return;
      }
      if (status === 'no_progress') {
        summaryState.skipOnlyCycles += delta;
        return;
      }
      summaryState.unknownCycles += delta;
    }

    function accountSummaryRow(row) {
      if (row.getAttribute('data-summary-accounted') === 'true') {
        return;
      }

      row.setAttribute('data-summary-accounted', 'true');
      summaryState.totalRows += 1;

      const action = (row.getAttribute('data-action') || '').toLowerCase();
      if (action === 'searched') {
        summaryState.searchedRows += 1;
      } else if (action === 'skipped') {
        summaryState.skippedRows += 1;
      } else if (action === 'error') {
        summaryState.errorRows += 1;
      } else if (action === 'info') {
        summaryState.infoRows += 1;
      }

      const cycleId = row.getAttribute('data-cycle-id') || '';
      const cycleProgress = row.getAttribute('data-cycle-progress') || '';
      if (!cycleId) {
        summaryState.legacyRows += 1;
        return;
      }

      const previous = summaryState.cycleProgressById.get(cycleId) || '';
      const next = mergeCycleProgress(previous, cycleProgress);
      if (!previous) {
        summaryState.totalCycles += 1;
        summaryState.cycleProgressById.set(cycleId, next);
        adjustCycleBucket(next, 1);
        return;
      }

      if (previous !== next) {
        summaryState.cycleProgressById.set(cycleId, next);
        adjustCycleBucket(previous, -1);
        adjustCycleBucket(next, 1);
      }
    }

    function renderSummaryState() {
      setSummaryValue('summary-total-rows', summaryState.totalRows);
      setSummaryValue('summary-total-cycles', summaryState.totalCycles);
      setSummaryValue('summary-searched-cycles', summaryState.searchedCycles);
      setSummaryValue('summary-skip-cycles', summaryState.skipOnlyCycles);
      setSummaryValue('summary-unknown-cycles', summaryState.unknownCycles);
      setSummaryValue('summary-legacy-rows', summaryState.legacyRows);
      setSummaryValue('summary-searched-rows', summaryState.searchedRows);
      setSummaryValue('summary-skipped-rows', summaryState.skippedRows);
      setSummaryValue('summary-error-rows', summaryState.errorRows);
      setSummaryValue('summary-info-rows', summaryState.infoRows);
    }

    function resetSummaryState() {
      summaryState.totalRows = 0;
      summaryState.searchedRows = 0;
      summaryState.skippedRows = 0;
      summaryState.errorRows = 0;
      summaryState.infoRows = 0;
      summaryState.legacyRows = 0;
      summaryState.totalCycles = 0;
      summaryState.searchedCycles = 0;
      summaryState.skipOnlyCycles = 0;
      summaryState.unknownCycles = 0;
      summaryState.cycleProgressById.clear();
    }

    function rebuildSummaryFromVisibleRows() {
      resetSummaryState();
      document.querySelectorAll('#log-tbody tr[data-log-row="true"]').forEach((row) => {
        row.removeAttribute('data-summary-accounted');
        accountSummaryRow(row);
      });
      renderSummaryState();
    }

    function updateSummaryForAppendedRows(rows) {
      rows.forEach((row) => {
        accountSummaryRow(row);
      });
      renderSummaryState();
    }

    formatVisibleLogTimestamps(document);
    rebuildSummaryFromVisibleRows();

    // Both the desktop (summary-row) and mobile (header-row) copy buttons share state.
    const copyBtns = Array.from(
      document.querySelectorAll('#copy-visible-logs-btn, #copy-visible-logs-btn-mobile'),
    );
    const copyLabels = Array.from(
      document.querySelectorAll('#copy-visible-logs-label, .copy-visible-logs-label'),
    );
    let copyButtonTimer = null;
    let copyLabelSwapTimer = null;

    function setCopyButtonLabel(nextLabel) {
      if (!copyLabels.length) {
        return;
      }

      if (copyLabels[0].textContent === nextLabel) {
        return;
      }

      if (copyLabelSwapTimer) {
        window.clearTimeout(copyLabelSwapTimer);
        copyLabelSwapTimer = null;
      }

      copyLabels.forEach((el) => el.classList.add('opacity-0'));
      copyLabelSwapTimer = window.setTimeout(() => {
        copyLabels.forEach((el) => {
          el.textContent = nextLabel;
          el.classList.remove('opacity-0');
        });
        copyLabelSwapTimer = null;
      }, 120);
    }

    function flashCopyButtonState(state) {
      if (!copyBtns.length) {
        return;
      }

      if (copyButtonTimer) {
        window.clearTimeout(copyButtonTimer);
        copyButtonTimer = null;
      }

      copyBtns.forEach((btn) => {
        btn.classList.remove('bg-emerald-700', 'hover:bg-emerald-600', 'border-emerald-500/60');
        btn.classList.remove('bg-red-800', 'hover:bg-red-700', 'border-red-600/60');
      });

      if (state === 'success') {
        setCopyButtonLabel('Copied');
        copyBtns.forEach((btn) =>
          btn.classList.add('bg-emerald-700', 'hover:bg-emerald-600', 'border-emerald-500/60'),
        );
      } else if (state === 'error') {
        setCopyButtonLabel('Copy failed');
        copyBtns.forEach((btn) =>
          btn.classList.add('bg-red-800', 'hover:bg-red-700', 'border-red-600/60'),
        );
      } else {
        setCopyButtonLabel('Copy visible rows');
        return;
      }

      copyButtonTimer = window.setTimeout(() => {
        flashCopyButtonState('idle');
      }, 1200);
    }

    copyBtns.forEach((btn) => btn.addEventListener('click', copyVisibleLogRows, { signal }));

    document.body.addEventListener(
      'htmx:afterSwap',
      (evt) => {
        const target = evt.detail && evt.detail.target;
        if (!target) {
          return;
        }

        if (target.id === 'log-tbody') {
          formatVisibleLogTimestamps(target);
          rebuildSummaryFromVisibleRows();
          return;
        }

        if (target.id === 'pagination-row') {
          const appendedRows = Array.from(
            document.querySelectorAll('#log-tbody tr[data-log-row="true"].htmx-added'),
          );
          formatVisibleLogTimestamps(document);
          if (appendedRows.length > 0) {
            updateSummaryForAppendedRows(appendedRows);
          } else {
            rebuildSummaryFromVisibleRows();
          }
        }
      },
      { signal },
    );

    document.body.addEventListener(
      'htmx:beforeRequest',
      (evt) => {
        const requestPath = evt.detail?.pathInfo?.requestPath || '';
        if (!requestPath.includes('/api/logs/partial')) {
          return;
        }

        const shell = document.getElementById('logs-table-shell');
        if (shell) {
          shell.classList.add('is-loading');
        }
      },
      { signal },
    );

    document.body.addEventListener(
      'htmx:afterRequest',
      (evt) => {
        const requestPath = evt.detail?.pathInfo?.requestPath || '';
        if (!requestPath.includes('/api/logs/partial')) {
          return;
        }

        const shell = document.getElementById('logs-table-shell');
        if (shell) {
          shell.classList.remove('is-loading');
        }
      },
      { signal },
    );
  })();
</script>
