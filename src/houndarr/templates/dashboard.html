{% extends "base.html" %}

{% block title %}Dashboard — Houndarr{% endblock %}

{% block head %}
<style>
  [data-run-now-btn="true"] {
    transition: background-color 180ms ease, color 180ms ease, box-shadow 180ms ease, transform 180ms ease;
  }

  [data-run-now-btn="true"].is-running {
    background-color: rgb(14 116 144);
    color: rgb(224 242 254);
    box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.38) inset;
  }

  [data-run-now-btn="true"].is-success {
    background-color: rgb(22 101 52);
    color: rgb(220 252 231);
    box-shadow: 0 0 0 1px rgba(74, 222, 128, 0.4) inset;
  }

  [data-run-now-btn="true"].is-error {
    background-color: rgb(153 27 27);
    color: rgb(254 226 226);
    box-shadow: 0 0 0 1px rgba(248, 113, 113, 0.45) inset;
    animation: run-now-shake 320ms ease;
  }

  @keyframes run-now-shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-3px); }
    40% { transform: translateX(3px); }
    60% { transform: translateX(-2px); }
    80% { transform: translateX(2px); }
  }

  @media (prefers-reduced-motion: reduce) {
    [data-run-now-btn="true"].is-error {
      animation: none;
    }
  }
</style>
{% endblock %}

{% block content %}
<div class="flex items-center justify-between mb-6">
  <h1 class="text-2xl font-bold text-white">Dashboard</h1>
  <a href="/settings"
     class="text-sm text-brand-400 hover:text-brand-300 transition-colors">
    + Add Instance
  </a>
</div>

<!-- Instance cards — polled every 15 s via HTMX -->
<div id="instance-grid"
     hx-get="/api/status"
     hx-trigger="load, every 15s"
     hx-swap="innerHTML"
     hx-target="#instance-grid">
  <!-- Skeleton shown while the first poll loads -->
  <div class="text-center py-20 text-slate-500">
    <svg class="w-8 h-8 mx-auto mb-3 opacity-30 animate-spin" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor"
        d="M4 12a8 8 0 018-8v8H4z"></path>
    </svg>
    <p class="text-sm text-slate-500">Loading…</p>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  const RUN_NOW_MIN_RUNNING_MS = 700;
  const RUN_NOW_SUCCESS_HOLD_MS = 900;
  const RUN_NOW_ERROR_HOLD_MS = 1100;

  function setRunNowButtonState(button, state) {
    const label = button.querySelector('[data-run-now-label]');
    const icon = button.querySelector('[data-run-now-icon]');

    button.classList.remove('is-running', 'is-success', 'is-error');
    if (icon) {
      icon.classList.remove('animate-spin');
    }

    if (state === 'running') {
      button.classList.add('is-running');
      button.disabled = true;
      button.setAttribute('aria-busy', 'true');
      if (label) {
        label.textContent = 'Running...';
      }
      if (icon) {
        icon.classList.add('animate-spin');
      }
      return;
    }

    button.disabled = false;
    button.setAttribute('aria-busy', 'false');

    if (state === 'success') {
      button.classList.add('is-success');
      if (label) {
        label.textContent = 'Queued';
      }
      return;
    }

    if (state === 'error') {
      button.classList.add('is-error');
      if (label) {
        label.textContent = 'Failed';
      }
      return;
    }

    if (label) {
      label.textContent = 'Run now';
    }
  }

  function completeRunNowRequest(button, statusCode) {
    const startedAt = Number(button.dataset.runNowStartedAt || 0);
    const elapsed = Math.max(0, Date.now() - startedAt);
    const waitForMin = Math.max(0, RUN_NOW_MIN_RUNNING_MS - elapsed);
    const outcome = statusCode >= 200 && statusCode < 300 ? 'success' : 'error';
    const holdMs = outcome === 'success' ? RUN_NOW_SUCCESS_HOLD_MS : RUN_NOW_ERROR_HOLD_MS;

    window.setTimeout(function() {
      if (!document.body.contains(button)) {
        return;
      }

      setRunNowButtonState(button, outcome);

      window.setTimeout(function() {
        if (!document.body.contains(button)) {
          return;
        }
        setRunNowButtonState(button, 'idle');
      }, holdMs);
    }, waitForMin);
  }

  // HTMX renders JSON from /api/status into the grid — we use a response
  // handler to convert the JSON array into cards.
  document.body.addEventListener("htmx:beforeSwap", function (evt) {
    if (evt.detail.target.id !== "instance-grid") return;

    let data;
    try {
      data = JSON.parse(evt.detail.serverResponse);
    } catch {
      return; // leave default swap behaviour
    }

    if (!Array.isArray(data)) return;

    if (data.length === 0) {
      evt.detail.serverResponse = `
        <div class="text-center py-20 text-slate-500">
          <svg class="w-16 h-16 mx-auto mb-4 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
          <p class="text-lg font-medium text-slate-400">No instances configured yet</p>
          <p class="mt-2 text-sm">
            <a href="/settings" class="text-brand-400 hover:text-brand-300">Add a Sonarr or Radarr instance</a>
            to get started.
          </p>
        </div>`;
      return;
    }

    const cards = data.map(inst => {
      const badge = inst.enabled
        ? `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium bg-green-900/60 text-green-300">
             <span class="w-1.5 h-1.5 rounded-full bg-green-400 inline-block"></span> Active
           </span>`
        : `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium bg-slate-700 text-slate-400">
             <span class="w-1.5 h-1.5 rounded-full bg-slate-500 inline-block"></span> Disabled
           </span>`;

      const typeBadge = inst.type === "sonarr"
        ? `<span class="text-xs font-mono bg-sky-900/50 text-sky-300 px-2 py-0.5 rounded">Sonarr</span>`
        : `<span class="text-xs font-mono bg-red-900/50 text-red-300 px-2 py-0.5 rounded">Radarr</span>`;

      const lastSearch = inst.last_search_at
        ? new Date(inst.last_search_at).toLocaleString()
        : "Never";

      return `
        <div class="bg-slate-900 border border-slate-800 rounded-xl p-5 flex flex-col gap-4">
          <!-- Header -->
          <div class="flex items-start justify-between gap-3">
            <div>
              <div class="flex items-center gap-2 flex-wrap">
                <h2 class="text-base font-semibold text-white">${escHtml(inst.name)}</h2>
                ${typeBadge}
              </div>
              <div class="mt-1">${badge}</div>
            </div>
            <button
              hx-post="/api/instances/${inst.id}/run-now"
              hx-swap="none"
              data-run-now-btn="true"
              data-instance-id="${inst.id}"
              title="Run search now"
              class="shrink-0 flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium
                     bg-brand-600 hover:bg-brand-500 text-white transition-colors disabled:opacity-50">
              <svg data-run-now-icon class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
              <span data-run-now-label>Run now</span>
            </button>
          </div>

          <!-- Stats grid -->
          <dl class="grid grid-cols-3 gap-3 text-center">
            <div class="bg-slate-800/60 rounded-lg px-3 py-2">
              <dt class="text-[11px] text-slate-500 uppercase tracking-wide">Last hour</dt>
              <dd class="text-lg font-bold text-white mt-0.5">${inst.searches_last_hour}</dd>
            </div>
            <div class="bg-slate-800/60 rounded-lg px-3 py-2">
              <dt class="text-[11px] text-slate-500 uppercase tracking-wide">Today</dt>
              <dd class="text-lg font-bold text-white mt-0.5">${inst.searches_today}</dd>
            </div>
            <div class="bg-slate-800/60 rounded-lg px-3 py-2">
              <dt class="text-[11px] text-slate-500 uppercase tracking-wide">Total</dt>
              <dd class="text-lg font-bold text-white mt-0.5">${inst.items_found_total}</dd>
            </div>
          </dl>

          <!-- Last search -->
          <p class="text-xs text-slate-500">
            Last search: <span class="text-slate-400">${lastSearch}</span>
          </p>
        </div>`;
    }).join("");

    evt.detail.serverResponse = `<div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">${cards}</div>`;
  });

  function escHtml(s) {
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  document.body.addEventListener('htmx:beforeRequest', function(evt) {
    const triggerEl = evt.detail.elt;
    if (!triggerEl || !triggerEl.matches('[data-run-now-btn="true"]')) {
      return;
    }

    triggerEl.dataset.runNowStartedAt = String(Date.now());
    setRunNowButtonState(triggerEl, 'running');
  });

  document.body.addEventListener('htmx:afterRequest', function(evt) {
    const triggerEl = evt.detail.elt;
    if (!triggerEl || !triggerEl.matches('[data-run-now-btn="true"]')) {
      return;
    }

    const statusCode = evt.detail.xhr ? evt.detail.xhr.status : 0;
    completeRunNowRequest(triggerEl, statusCode);
  });
</script>
{% endblock %}
